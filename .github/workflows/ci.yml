name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff
        run: uv run ruff check api tests --output-format=github

      - name: Run pytest
        run: uv run pytest
