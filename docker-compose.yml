services:
  postgres:
    image: postgres:16-alpine
    container_name: nhanes_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nhanes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nhanes_pass}
      POSTGRES_DB: ${POSTGRES_DB:-nhanes_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nhanes} -d ${POSTGRES_DB:-nhanes_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: nhanes_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./feature_schema.json:/app/feature_schema.json:ro
    environment:
      PYTHONUNBUFFERED: "1"
      EV3_ROOT: /app
      CORS_ORIGINS: http://localhost:3000,http://localhost:8501,http://nhanes_dashboard:8501
      DATABASE_URL: postgresql://${POSTGRES_USER:-nhanes}:${POSTGRES_PASSWORD:-nhanes_pass}@postgres:5432/${POSTGRES_DB:-nhanes_db}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboards
      dockerfile: Dockerfile
    container_name: nhanes_dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nhanes}:${POSTGRES_PASSWORD:-nhanes_pass}@postgres:5432/${POSTGRES_DB:-nhanes_db}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: nhanes_postgres_data

networks:
  default:
    name: nhanes_network
