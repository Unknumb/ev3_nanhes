# Aquí le decimos a Kedro dónde y cómo guardar el output de tu nodo
raw_nhanes_2015:
  type: pandas.CSVDataset
  filepath: data/01_raw/nhanes_2015_maestra.csv
  # Si en el futuro falla por memoria, podemos cambiar type a pandas.ParquetDataset

preprocessed_nhanes_2015:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/nhanes_2015_procesado.parquet

modelo_clasificacion_nhanes_2015:
  type: pickle.PickleDataset
  filepath: data/06_models/xgb_clasificacion_2015.pkl
  versioned: true

modelo_regresion_nhanes_2015:
  type: pickle.PickleDataset
  filepath: data/06_models/xgb_regresion_2015.pkl
  versioned: true

# Reportes de métricas (Accuracy / MAE) persistidos a texto
reporte_clasificacion_nhanes_2015:
  type: text.TextDataset
  filepath: data/08_reporting/reporte_clasificacion_2015.txt

reporte_regresion_nhanes_2015:
  type: text.TextDataset
  filepath: data/08_reporting/reporte_regresion_2015.txt

