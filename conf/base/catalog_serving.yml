# Modelo de producción (modelo COMBINADO: todos los ciclos 2005-2018) bendecido
# a ruta estable. Los nombres de archivo conservan el sufijo "_2015" por
# compatibilidad con la API/volúmenes Docker, pero el contenido es el modelo
# combinado. Estos datasets NO son versionados: la API siempre lee el mismo filepath.

modelo_serving_clasificacion:
  type: pickle.PickleDataset
  filepath: data/09_serving/model_clasificacion_2015.pkl

modelo_serving_regresion:
  type: pickle.PickleDataset
  filepath: data/09_serving/model_regresion_2015.pkl

serving_metadata:
  type: json.JSONDataset
  filepath: data/09_serving/metadata.json
