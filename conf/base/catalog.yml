# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

# NHANES 2017-2018 Datasets from CDC
# These datasets are loaded directly from online URLs using custom SAS loader

demo_data:
  type: ev3_nhanes.loaders.SASDataset
  filepath: https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2017/DataFiles/DEMO_J.xpt

bmx_data:
  type: ev3_nhanes.loaders.SASDataset
  filepath: https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2017/DataFiles/BMX_J.xpt

bpx_data:
  type: ev3_nhanes.loaders.SASDataset
  filepath: https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2017/DataFiles/BPX_J.xpt

diq_data:
  type: ev3_nhanes.loaders.SASDataset
  filepath: https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2017/DataFiles/DIQ_J.xpt

smq_data:
  type: ev3_nhanes.loaders.SASDataset
  filepath: https://wwwn.cdc.gov/Nchs/Data/Nhanes/Public/2017/DataFiles/SMQ_J.xpt

mortality_data:
  type: ev3_nhanes.loaders.MortalityDataset
  filepath: https://ftp.cdc.gov/pub/Health_Statistics/NCHS/datalinkage/linked_mortality/NHANES_2017_2018_MORT_2019_PUBLIC.dat
