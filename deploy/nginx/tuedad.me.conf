# Nginx reverse proxy para EV3 NHANES Longevity.
#
# Sirve:
#   tuedad.me / www.tuedad.me  -> frontend Next.js  (localhost:3000)
#   api.tuedad.me              -> backend uvicorn    (localhost:8000)
#
# Instalación (Ubuntu/Debian en EC2):
#   sudo apt update && sudo apt install -y nginx
#   sudo cp deploy/nginx/tuedad.me.conf /etc/nginx/sites-available/tuedad.me
#   sudo ln -s /etc/nginx/sites-available/tuedad.me /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default     # quita el sitio por defecto
#   sudo nginx -t && sudo systemctl reload nginx
#
# Luego HTTPS con Certbot (añade los bloques :443 y el redirect automáticamente):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d tuedad.me -d www.tuedad.me -d api.tuedad.me
#
# Requisitos previos:
#   - DNS: A records de tuedad.me / www / api -> tu Elastic IP (ya hecho).
#   - Security Group de EC2: abrir 80 y 443. (8000/3000 pueden quedar CERRADOS
#     al exterior: Nginx los alcanza por localhost.)
#   - Front y back corriendo en localhost:3000 y localhost:8000.

# ── Frontend: tuedad.me y www ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tuedad.me www.tuedad.me;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / HMR (inofensivo en prod):
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Backend API: api.tuedad.me ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.tuedad.me;

    # El informe PDF/HTML puede ser grande; sube el límite de body.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # /predict y /explain (SHAP) pueden tardar
    }
}
